<!DOCTYPE html>
<html>
<head>
    <title>DOC CHAT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        .messenger-wrapper {
            width: 400px; height: 600px; background: #fff;
            border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .chat-header {
            background: #fff; border-bottom: 1px solid #e4e6eb;
            padding: 12px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0;
        }
        .back-btn {
            background: #e4e6eb; border: none; border-radius: 50%;
            width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; text-decoration: none; transition: background 0.2s; flex-shrink: 0;
        }
        .back-btn:hover { background: #d8dadf; }
        .avatar-wrap { position: relative; flex-shrink: 0; }
        .avatar-wrap img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .online-dot {
            position: absolute; bottom: 1px; right: 1px;
            width: 10px; height: 10px; background: #31a24c; border-radius: 50%; border: 2px solid #fff;
        }
        .header-info { flex: 1; }
        .header-name { font-size: 15px; font-weight: 600; color: #050505; }
        .header-status { font-size: 12px; color: #65676b; }
        .header-actions { display: flex; gap: 4px; }
        .action-btn {
            background: #e4e6eb; border: none; border-radius: 50%;
            width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: background 0.2s;
        }
        .action-btn:hover { background: #d8dadf; }
        .messages-area {
            flex: 1; overflow-y: auto; padding: 12px;
            display: flex; flex-direction: column; gap: 4px; background: #fff;
        }
        .messages-area::-webkit-scrollbar { width: 4px; }
        .messages-area::-webkit-scrollbar-thumb { background: #d8dadf; border-radius: 4px; }
        .encrypted-notice { text-align: center; font-size: 12px; color: #65676b; padding: 8px 16px; margin-bottom: 4px; }
        .encrypted-notice span { background: #f0f2f5; padding: 6px 12px; border-radius: 12px; display: inline-block; }
        .msg-row { display: flex; align-items: flex-end; gap: 6px; }
        .msg-row.sent { flex-direction: row-reverse; }
        .msg-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
        .msg-bubble { max-width: 65%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4; word-break: break-word; }
        .msg-row.received .msg-bubble { background: #0084ff; color: #fff; border-bottom-left-radius: 4px; }
        .msg-row.sent .msg-bubble { background: #e4e6eb; color: #050505; border-bottom-right-radius: 4px; }
        .input-area {
            background: #fff; border-top: 1px solid #e4e6eb;
            padding: 10px 12px; display: flex; align-items: center; gap: 8px; flex-shrink: 0;
        }
        .input-icon-btn {
            background: none; border: none; cursor: pointer;
            display: flex; align-items: center; padding: 6px; border-radius: 50%; transition: background 0.2s;
        }
        .input-icon-btn:hover { background: #e4e6eb; }
        .input-field-wrap { flex: 1; background: #f0f2f5; border-radius: 22px; padding: 8px 14px; display: flex; align-items: center; }
        .input-field-wrap input[type="text"] { border: none; background: transparent; outline: none; font-size: 14px; color: #050505; width: 100%; font-family: inherit; }
        .input-field-wrap input::placeholder { color: #8a8d91; }
        #send { display: none; }
        .send-btn {
            background: none; border: none; cursor: pointer;
            display: flex; align-items: center; padding: 6px; border-radius: 50%; transition: background 0.2s, transform 0.1s;
        }
        .send-btn:hover { background: #e4e6eb; transform: scale(1.1); }
    </style>
</head>
<body>
<div class="messenger-wrapper">
    <div class="chat-header">
        <a href="javascript:history.back()" class="back-btn">
            <svg width="10" height="16" viewBox="0 0 10 16" fill="none">
                <path d="M8.5 1L1.5 8L8.5 15" stroke="#050505" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </a>
        <div class="avatar-wrap">
            <img src="/static/btm.jpg" alt="Avatar">
            <div class="online-dot"></div>
        </div>
        <div class="header-info">
            <div class="header-name">{{ uu.name }}</div>
            <div class="header-status">Active now</div>
        </div>
        <div class="header-actions">
            <button class="action-btn" title="Audio call">
                <svg width="18" height="18" fill="#0084ff" viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
            </button>
            <button class="action-btn" title="Video call">
                <svg width="18" height="18" fill="#0084ff" viewBox="0 0 24 24"><path d="M15 8v8H5V8h10m1-2H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4V7c0-.55-.45-1-1-1z"/></svg>
            </button>
        </div>
    </div>

    <form method="post" style="display:flex; flex-direction:column; flex:1; overflow:hidden;">
        {% csrf_token %}
        <div class="messages-area" id="msgArea">
            <div class="encrypted-notice">
                <span>🔒 Messages and calls are end-to-end encrypted.</span>
            </div>
            {% for i in kk %}
                {% if i.sendertype == "doctor" %}
                    <div class="msg-row received">
                        <img src="/static/av.png" alt="Avatar" class="msg-avatar">
                        <div class="msg-bubble">{{ i.message }}</div>
                    </div>
                {% else %}
                    <div class="msg-row sent">
                        <img src="/static/btm.jpg" alt="Avatar" class="msg-avatar">
                        <div class="msg-bubble">{{ i.message }}</div>
                    </div>
                {% endif %}
            {% endfor %}
        </div>

        <div class="input-area">
            <button type="button" class="input-icon-btn" title="More">
                <svg width="22" height="22" fill="#0084ff" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
            </button>
            <div class="input-field-wrap">
                <input type="text" name="mssg" placeholder="Aa" autocomplete="off">
            </div>
            <button type="button" class="input-icon-btn" title="Emoji">
                <svg width="22" height="22" fill="#0084ff" viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/></svg>
            </button>
            <input type="submit" id="send">
            <label for="send" class="send-btn" title="Send">
                <svg width="22" height="22" fill="#0084ff" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </label>
        </div>
    </form>
</div>
<script>
    const msgArea = document.getElementById('msgArea');
    msgArea.scrollTop = msgArea.scrollHeight;
</script>
</body>
</html>
