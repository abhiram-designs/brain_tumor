<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Disease Management</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-bottom: 5px;
    }

    input, textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    textarea {
      resize: none;
    }

    button {
      padding: 10px 15px;
      background: #0d6efd;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background: #0b5ed7;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 25px;
    }

    table, th, td {
      border: 1px solid #ccc;
    }

    th, td {
      padding: 10px;
      text-align: center;
    }

    th {
      background: #f1f1f1;
    }

    .delete-btn {
      background: #dc3545;
    }

    .delete-btn:hover {
      background: #b02a37;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Disease Management</h2>

  <!-- Add Disease Form -->
  <form>
    <div class="form-group">
      <label>Disease ID</label>
      <input type="text" name="disease_id" required />
    </div>

    <div class="form-group">
      <label>Disease Name</label>
      <input type="text" name="disease_name" required />
    </div>

    <div class="form-group">
      <label>Symptoms</label>
      <textarea rows="3" name="symptoms" required></textarea>
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea rows="3" name="description"></textarea>
    </div>

    <button type="submit">Add Disease</button>
  </form>

  <!-- Disease List -->
  <table>
    <thead>
      <tr>
        <th>Disease ID</th>
        <th>Name</th>
        <th>Symptoms</th>
        <th>Description</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>D001</td>
        <td>Diabetes</td>
        <td>Thirst, fatigue</td>
        <td>High blood sugar levels</td>
        <td><button class="delete-btn">Delete</button></td>
      </tr>
    </tbody>
  </table>
</div>

</body>
</html>
