<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Doctor Registration</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      overflow: hidden;
      position: relative;
    }

    .bg-animation {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }

    .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      animation: float 15s infinite ease-in-out;
    }

    .circle:nth-child(1){width:80px;height:80px;top:10%;left:20%;animation-delay:0s;animation-duration:12s;}
    .circle:nth-child(2){width:120px;height:120px;top:60%;left:80%;animation-delay:2s;animation-duration:18s;}
    .circle:nth-child(3){width:60px;height:60px;top:80%;left:10%;animation-delay:4s;animation-duration:15s;}
    .circle:nth-child(4){width:100px;height:100px;top:20%;left:70%;animation-delay:1s;animation-duration:20s;}
    .circle:nth-child(5){width:90px;height:90px;top:40%;left:40%;animation-delay:3s;animation-duration:16s;}

    @keyframes float {
      0%,100%{transform:translateY(0) translateX(0) scale(1);opacity:0.3;}
      50%{transform:translateY(-50px) translateX(30px) scale(1.2);opacity:0.6;}
    }

    .form-box {
      background: rgba(255, 255, 255, 0.95);
      padding: 35px;
      width: 420px;
      border-radius: 15px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
      position: relative;
      z-index: 1;
      animation: slideIn 0.6s ease-out;
      backdrop-filter: blur(10px);
      max-height: 90vh;
      overflow-y: auto;
    }

    .form-box h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #667eea;
      font-size: 28px;
      font-weight: 600;
    }

    label {
      font-size: 14px;
      font-weight: 600;
      color: #333;
      display: block;
      margin-bottom: 6px;
    }

    input, select {
      width: 100%;
      padding: 10px 12px;
      margin: 0 0 18px 0;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.3s ease;
      font-family: Arial, sans-serif;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      transform: translateY(-2px);
    }

    select { cursor: pointer; background: white; }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
      margin-top: 10px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }

    .form-group { position: relative; }

    .register {
            text-align: center;
            margin-top: 20px;
        }

        .register p {
            margin: 8px 0;
            color: #666;
            font-size: 14px;
        }

        .register a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .register a:hover {
            color: #764ba2;
            text-decoration: underline;
        }
  </style>
</head>
<body>

<div class="bg-animation">
  <div class="circle"></div>
  <div class="circle"></div>
  <div class="circle"></div>
  <div class="circle"></div>
  <div class="circle"></div>
</div>

<div class="form-box">
  <h2>Doctor Registration</h2>

  <form method="POST" onsubmit="return validateDoctorForm()">
    {% csrf_token %}

    <div class="form-group">
      <label>Name</label>
      <input type="text" name="name" id="name" required />
    </div>

    <div class="form-group">
      <label>Gender</label>
      <select name="gender" id="gender" required>
        <option value="">Select</option>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
      </select>
    </div>

    <div class="form-group">
      <label>Department</label>
      <select name="dept" id="dept" required>
        <option value="">Select Department</option>
        <option value="Cardiology">Cardiology</option>
        <option value="Neurology">Neurology</option>
        <option value="Orthopedics">Orthopedics</option>
        <option value="Pediatrics">Pediatrics</option>
        <option value="Dermatology">Dermatology</option>
        <option value="ENT">ENT</option>
        <option value="General Medicine">General Medicine</option>
        <option value="Gynecology">Gynecology</option>
      </select>
    </div>

    <div class="form-group">
      <label>Qualification</label>
      <input type="text" name="qualification" id="qualification" required />
    </div>

    <div class="form-group">
      <label>Experience</label>
      <input type="text" name="experience" id="experience" required />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" id="email" required />
    </div>

    <div class="form-group">
      <label>Contact Number</label>
      <input type="text" name="contact" id="contact" maxlength="10" required />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" id="password" required />
    </div>

    <button type="submit">Register</button>
  </form>
  <div class="register">
        <p>Already Registered? <a href="/login/">Login</a></p>
    </div>
</div>

<script>
function validateDoctorForm() {
  const name = document.getElementById("name").value.trim();
  const exp = document.getElementById("experience").value.trim();
  const email = document.getElementById("email").value.trim();
  const contact = document.getElementById("contact").value.trim();
  const password = document.getElementById("password").value;

  const nameRegex = /^[A-Za-z .]+$/;
  if (!nameRegex.test(name)) {
    alert("Name should contain only letters.");
    return false;
  }

  const expRegex = /^[0-9]+(\s?years?)?$/i;
  if (!expRegex.test(exp)) {
    alert("Enter valid experience (example: 5 or 5 years).");
    return false;
  }

  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!emailRegex.test(email)) {
    alert("Enter valid email.");
    return false;
  }

  const phoneRegex = /^[6-9]\d{9}$/;
  if (!phoneRegex.test(contact)) {
    alert("Enter valid 10-digit contact number.");
    return false;
  }

  const passRegex = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d@#$%^&*!]{6,}$/;
  if (!passRegex.test(password)) {
    alert("Password must be at least 6 characters and include letters and numbers.");
    return false;
  }

  return true;
}
</script>

</body>
</html>
